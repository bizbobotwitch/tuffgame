<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Co-Op Vanguard</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050510; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; touch-action: none;
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI Menus */
        #menu {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 20, 0.9); padding: 30px;
            border: 2px solid #0ff; border-radius: 15px;
            box-shadow: 0 0 20px #0ff;
            text-align: center; width: 320px; z-index: 10;
        }
        h2 { color: #f0f; text-shadow: 0 0 10px #f0f; margin-top: 0; }
        input, button {
            width: 90%; padding: 12px; margin: 10px 0;
            background: #111; color: #0ff;
            border: 1px solid #0ff; border-radius: 8px;
            font-family: inherit; font-size: 16px;
            box-shadow: 0 0 5px #0ff inset;
        }
        button { cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { background: #0ff; color: #000; }
        #my-id-display { font-weight: bold; color: #f0f; margin-bottom: 15px; word-break: break-all; }

        /* Shared HUD */
        #hud {
            position: absolute; top: 20px; left: 0; width: 100%;
            text-align: center; font-size: 24px; font-weight: bold;
            color: #fff; text-shadow: 0 0 10px #fff; pointer-events: none;
            display: none; z-index: 5;
        }

        /* Mobile Controls */
        #controls {
            position: absolute; bottom: 30px; left: 0; width: 100%;
            display: none; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box; pointer-events: none; z-index: 5;
        }
        .control-group { display: flex; gap: 15px; pointer-events: auto; }
        .control-group-col { display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .btn {
            width: 65px; height: 65px; border-radius: 50%;
            background: rgba(0, 255, 255, 0.1); border: 2px solid #0ff;
            color: #0ff; font-weight: bold; display: flex;
            align-items: center; justify-content: center; user-select: none;
            box-shadow: 0 0 10px #0ff inset, 0 0 10px #0ff;
        }
        .btn:active { background: rgba(0, 255, 255, 0.5); }
        .btn-action { border-color: #f0f; color: #f0f; box-shadow: 0 0 10px #f0f inset, 0 0 10px #f0f; }
        .btn-action:active { background: rgba(255, 0, 255, 0.5); }
        .btn-brake { border-color: #ff3333; color: #ff3333; box-shadow: 0 0 10px #ff3333 inset, 0 0 10px #ff3333; }
        .btn-brake:active { background: rgba(255, 51, 51, 0.5); }
    </style>
</head>
<body>

    <div id="menu">
        <h2>NEON VANGUARD</h2>
        <p>Your Co-Op ID:</p>
        <div id="my-id-display">Initializing Neural Link...</div>
        <p>Share this ID with your wingman, or enter theirs below!</p>
        <input type="text" id="friend-id" placeholder="Wingman's ID">
        <button id="join-btn">Initiate Co-Op</button>
        <p id="status"></p>
    </div>

    <div id="hud">SCORE: <span id="scoreDisplay">0</span></div>

    <div id="controls">
        <div class="control-group" style="align-items: flex-end;">
            <div class="btn" id="btn-left">◀</div>
            <div class="btn" id="btn-right">▶</div>
        </div>
        <div class="control-group">
            <div class="control-group-col">
                <div class="btn btn-action" id="btn-fire">FIRE</div>
                <div class="btn btn-brake" id="btn-brake">STOP</div>
            </div>
            <div class="btn" style="width: 80px; height: 140px; border-radius: 40px;" id="btn-gas">GAS</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- GAME ENGINE SETUP ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // --- P2P NETWORK SETUP ---
        const peer = new Peer();
        let conn = null;
        let isHost = false;

        const myIdDisplay = document.getElementById('my-id-display');
        const friendIdInput = document.getElementById('friend-id');
        const joinBtn = document.getElementById('join-btn');
        const statusText = document.getElementById('status');
        const menu = document.getElementById('menu');
        const controls = document.getElementById('controls');
        const hud = document.getElementById('hud');
        const scoreDisplay = document.getElementById('scoreDisplay');

        peer.on('open', id => myIdDisplay.innerText = id);

        peer.on('connection', connection => {
            conn = connection;
            isHost = true;
            setupConnection();
        });

        joinBtn.addEventListener('click', () => {
            const friendId = friendIdInput.value.trim();
            if (!friendId) return;
            statusText.innerText = "Linking...";
            conn = peer.connect(friendId);
            setupConnection();
        });

        function setupConnection() {
            conn.on('open', () => {
                menu.style.display = 'none';
                controls.style.display = 'flex';
                hud.style.display = 'block';
                if (isHost) player.color = '#0ff'; // Host is Cyan
                else player.color = '#f0f'; // Client is Magenta
                startGame();
            });

            conn.on('data', data => {
                if (data.type === 'state') {
                    // Sync peer player
                    peerPlayer.x = data.px; peerPlayer.y = data.py;
                    peerPlayer.angle = data.pa; peerPlayer.color = data.pc;
                    peerPlayer.isThrusting = data.pt;
                    
                    // Sync peer lasers
                    if (data.fired) spawnLaser(peerPlayer.x, peerPlayer.y, peerPlayer.angle, peerPlayer.color, false);
                    
                    // Sync game state from host
                    if (!isHost && data.enemies) enemies = data.enemies;
                    if (!isHost && data.score !== undefined) sharedScore = data.score;
                }
            });
        }

        // --- INPUT HANDLING ---
        const keys = { left: false, right: false, gas: false, brake: false, fire: false };
        const bindBtn = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            el.addEventListener('mousedown', () => keys[key] = true);
            el.addEventListener('mouseup', () => keys[key] = false);
        };
        bindBtn('btn-left', 'left'); bindBtn('btn-right', 'right');
        bindBtn('btn-gas', 'gas'); bindBtn('btn-brake', 'brake');
        
        document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); tryFire(); });
        document.getElementById('btn-fire').addEventListener('mousedown', () => tryFire());

        // Keyboard backup for testing on PC
        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
            if(e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
            if(e.key === 'ArrowUp' || e.key === 'w') keys.gas = true;
            if(e.key === 'ArrowDown' || e.key === 's') keys.brake = true;
            if(e.key === ' ') tryFire();
        });
        window.addEventListener('keyup', e => {
            if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
            if(e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
            if(e.key === 'ArrowUp' || e.key === 'w') keys.gas = false;
            if(e.key === 'ArrowDown' || e.key === 's') keys.brake = false;
        });

        // --- GAME ENTITIES ---
        let gameRunning = false;
        let sharedScore = 0;
        
        const player = { x: 0, y: 0, vx: 0, vy: 0, angle: -Math.PI/2, color: '#0ff', isThrusting: false, justFired: false, cooldown: 0 };
        const peerPlayer = { x: -9999, y: -9999, angle: 0, color: '#f0f', isThrusting: false };
        
        let lasers = [];
        let enemies = [];
        let particles = [];

        function tryFire() {
            if (player.cooldown <= 0) {
                spawnLaser(player.x, player.y, player.angle, player.color, true);
                player.justFired = true;
                player.cooldown = 15; // Frames before next shot
            }
        }

        function spawnLaser(x, y, angle, color, isLocal) {
            // Offset laser to spawn at the nose of the ship
            const nx = x + Math.cos(angle) * 20;
            const ny = y + Math.sin(angle) * 20;
            lasers.push({ x: nx, y: ny, vx: Math.cos(angle) * 20, vy: Math.sin(angle) * 20, color: color, isLocal: isLocal, age: 0 });
        }

        function spawnExplosion(x, y, color) {
            for(let i=0; i<15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10,
                    life: 1.0, decay: Math.random() * 0.05 + 0.02, color: color
                });
            }
        }

        // --- GAME LOGIC ---
        function update() {
            // Physics & Movement
            if (keys.left) player.angle -= 0.08;
            if (keys.right) player.angle += 0.08;

            player.isThrusting = keys.gas;
            if (keys.gas) {
                player.vx += Math.cos(player.angle) * 0.4;
                player.vy += Math.sin(player.angle) * 0.4;
            }
            if (keys.brake) {
                player.vx *= 0.85; // Heavy friction for stopping
                player.vy *= 0.85;
            } else {
                player.vx *= 0.98; // Normal space drag
                player.vy *= 0.98;
            }

            player.x += player.vx;
            player.y += player.vy;
            if(player.cooldown > 0) player.cooldown--;

            // Engine Exhaust Particles
            if (player.isThrusting && Math.random() > 0.5) {
                particles.push({
                    x: player.x - Math.cos(player.angle) * 20, y: player.y - Math.sin(player.angle) * 20,
                    vx: -player.vx * 0.2 + (Math.random()-0.5), vy: -player.vy * 0.2 + (Math.random()-0.5),
                    life: 1.0, decay: 0.1, color: '#ffaa00'
                });
            }

            // Update Lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                l.x += l.vx; l.y += l.vy; l.age++;
                if (l.age > 100) { lasers.splice(i, 1); continue; }

                // Host checks collision between lasers and enemies
                if (isHost) {
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        let e = enemies[j];
                        if (Math.hypot(l.x - e.x, l.y - e.y) < e.size) {
                            spawnExplosion(e.x, e.y, '#ff0000');
                            enemies.splice(j, 1);
                            lasers.splice(i, 1);
                            sharedScore += 100;
                            break; // Laser destroyed, move to next laser
                        }
                    }
                }
            }

            // Host Enemy Logic (Spawning & AI)
            if (isHost) {
                // Spawn enemies periodically
                if (Math.random() < 0.02 && enemies.length < 20) {
                    let spawnDist = 1000;
                    let spawnAngle = Math.random() * Math.PI * 2;
                    // Target either player 1 or 2 randomly
                    let target = Math.random() > 0.5 ? player : peerPlayer;
                    enemies.push({
                        x: target.x + Math.cos(spawnAngle) * spawnDist,
                        y: target.y + Math.sin(spawnAngle) * spawnDist,
                        size: 20,
                        targetId: target === player ? 'host' : 'client'
                    });
                }

                // Move enemies toward their target
                enemies.forEach(e => {
                    let target = e.targetId === 'host' ? player : peerPlayer;
                    let angleToTarget = Math.atan2(target.y - e.y, target.x - e.x);
                    e.x += Math.cos(angleToTarget) * 3;
                    e.y += Math.sin(angleToTarget) * 3;
                });
            }

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life -= particles[i].decay;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            // Network Sync
            if (conn && conn.open) {
                let packet = {
                    type: 'state',
                    px: player.x, py: player.y, pa: player.angle, pc: player.color,
                    pt: player.isThrusting, fired: player.justFired
                };
                if (isHost) {
                    packet.enemies = enemies;
                    packet.score = sharedScore;
                }
                conn.send(packet);
                player.justFired = false;
            }

            scoreDisplay.innerText = sharedScore;
        }

        // --- RENDERING ---
        function draw() {
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            // Camera follows local player
            ctx.translate(width / 2 - player.x, height / 2 - player.y);

            // Draw Neon Grid
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 2;
            const gridSize = 150;
            const startX = Math.floor((player.x - width/2) / gridSize) * gridSize;
            const startY = Math.floor((player.y - height/2) / gridSize) * gridSize;
            
            ctx.beginPath();
            for (let x = startX; x < startX + width + gridSize; x += gridSize) {
                ctx.moveTo(x, player.y - height); ctx.lineTo(x, player.y + height);
            }
            for (let y = startY; y < startY + height + gridSize; y += gridSize) {
                ctx.moveTo(player.x - width, y); ctx.lineTo(player.x + width, y);
            }
            ctx.stroke();

            // Draw Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            // Draw Enemies (Rogue Drones)
            enemies.forEach(e => {
                ctx.save();
                ctx.translate(e.x, e.y);
                ctx.shadowBlur = 15; ctx.shadowColor = '#ff0000';
                ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(20, 0); ctx.lineTo(-10, 15); ctx.lineTo(-10, -15); ctx.closePath();
                ctx.stroke();
                ctx.restore();
            });

            // Draw Lasers
            lasers.forEach(l => {
                ctx.shadowBlur = 10; ctx.shadowColor = l.color;
                ctx.fillStyle = l.color;
                ctx.beginPath(); ctx.arc(l.x, l.y, 4, 0, Math.PI * 2); ctx.fill();
            });

            // Draw Players
            if (peerPlayer.x !== -9999) drawShip(peerPlayer.x, peerPlayer.y, peerPlayer.angle, peerPlayer.color, peerPlayer.isThrusting);
            drawShip(player.x, player.y, player.angle, player.color, player.isThrusting);

            ctx.restore();
        }

        function drawShip(x, y, angle, color, isThrusting) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            
            ctx.shadowBlur = 20;
            ctx.shadowColor = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.fillStyle = '#111';

            // Ship Hull (Sleek triangle design)
            ctx.beginPath();
            ctx.moveTo(20, 0); // Nose
            ctx.lineTo(-15, 15); // Right wing
            ctx.lineTo(-10, 0); // Engine indent
            ctx.lineTo(-15, -15); // Left wing
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Thruster Glow
            if (isThrusting) {
                ctx.fillStyle = '#fff';
                ctx.shadowColor = '#ffaa00';
                ctx.beginPath();
                ctx.moveTo(-12, -5); ctx.lineTo(-25, 0); ctx.lineTo(-12, 5);
                ctx.fill();
            }
            ctx.restore();
        }

        function loop() {
            if (!gameRunning) return;
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function startGame() {
            gameRunning = true;
            // Set initial spawn positions so players aren't perfectly stacked
            player.x = isHost ? -100 : 100;
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
