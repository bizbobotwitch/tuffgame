<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Vanguard: 3D Climax</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050510; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; touch-action: none;
        }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 20, 0.9); padding: 30px;
            border: 2px solid #0ff; border-radius: 15px; box-shadow: 0 0 20px #0ff;
            text-align: center; width: 320px; z-index: 10;
        }
        h2 { color: #f0f; text-shadow: 0 0 10px #f0f; margin-top: 0; }
        input, button {
            width: 90%; padding: 12px; margin: 10px 0; background: #111; color: #0ff;
            border: 1px solid #0ff; border-radius: 8px; font-family: inherit; font-size: 16px;
        }
        button { cursor: pointer; font-weight: bold; }
        #my-id-display { font-weight: bold; color: #f0f; margin-bottom: 15px; word-break: break-all; }

        #hud {
            position: absolute; top: 20px; left: 0; width: 100%;
            text-align: center; font-size: 20px; font-weight: bold;
            color: #fff; text-shadow: 0 0 10px #fff; pointer-events: none;
            display: none; z-index: 10;
        }
        .health-bar-container { width: 200px; height: 15px; border: 2px solid #fff; margin: 10px auto; border-radius: 10px; overflow: hidden; }
        #health-bar { width: 100%; height: 100%; background: #0f0; transition: width 0.2s, background 0.2s; }
        .hud-text { font-size: 16px; margin-top: 5px; text-shadow: 0 0 5px currentColor; }

        #controls {
            position: absolute; bottom: 30px; left: 0; width: 100%;
            display: none; justify-content: space-between; padding: 0 20px; box-sizing: border-box;
            pointer-events: none; z-index: 10;
        }
        .control-group { display: flex; gap: 15px; pointer-events: auto; }
        .control-group-col { display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .btn {
            width: 65px; height: 65px; border-radius: 50%;
            background: rgba(0, 255, 255, 0.1); border: 2px solid #0ff;
            color: #0ff; font-weight: bold; display: flex; align-items: center; justify-content: center; user-select: none;
        }
        .btn:active { background: rgba(0, 255, 255, 0.5); }
        .btn-action { border-color: #f0f; color: #f0f; }
        .btn-super { border-color: #ffaa00; color: #ffaa00; box-shadow: 0 0 15px currentColor; display: none; }
        .btn-brake { border-color: #ff3333; color: #ff3333; }
        .btn-dash { border-color: #ffaa00; color: #ffaa00; background: rgba(255, 170, 0, 0.1); }
        
        /* Impact Frame Overlay */
        #impact-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #fff; mix-blend-mode: difference; display: none; pointer-events: none; z-index: 2;
        }
    </style>
</head>
<body>

    <div id="menu">
        <h2>3D VILTRUM PROTOCOL</h2>
        <p>Your Link ID:</p>
        <div id="my-id-display">Generating Link...</div>
        <input type="text" id="friend-id" placeholder="Wingman's ID">
        <button id="join-btn">Initiate Link</button>
        <p id="status"></p>
    </div>

    <div id="hud">
        SCORE: <span id="scoreDisplay">0</span>
        <div class="health-bar-container"><div id="health-bar"></div></div>
        <div id="super-text" class="hud-text" style="color: #ffaa00; display: none;">READY</div>
    </div>

    <div id="controls">
        <div class="control-group" style="align-items: flex-end;">
            <div class="btn" id="btn-left">◀</div>
            <div class="btn" id="btn-right">▶</div>
        </div>
        <div class="control-group">
            <div class="control-group-col">
                <div class="btn btn-super" id="btn-super">SUPER</div>
                <div class="btn btn-action" id="btn-fire">FIRE</div>
                <div class="btn btn-brake" id="btn-brake">STOP</div>
            </div>
            <div class="btn" style="width: 80px; height: 140px; border-radius: 40px;" id="btn-gas">GAS</div>
        </div>
    </div>

    <div id="impact-overlay"></div>
    <div id="game-container"></div>

    <script>
        const container = document.getElementById('game-container');
        const overlay = document.getElementById('impact-overlay');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.001);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const pointLight = new THREE.PointLight(0xffaa00, 2, 1200);
        scene.add(pointLight);

        const gridHelper = new THREE.GridHelper(4000, 40, 0x00ffff, 0x002222);
        gridHelper.position.y = -20;
        scene.add(gridHelper);

        // --- IMPROVED PROCEDURAL VILTRUMITE MESH ---
        function createViltrumiteMesh() {
            const group = new THREE.Group();
            
            // Suit Base (Blue Legs, Yellow Torso)
            const torsoGeo = new THREE.BoxGeometry(14, 20, 10);
            const torsoMat = new THREE.MeshLambertMaterial({ color: 0xffcc00 });
            const torso = new THREE.Mesh(torsoGeo, torsoMat);
            torso.position.y = 10;
            group.add(torso);

            const legsGeo = new THREE.BoxGeometry(12, 14, 9);
            const legsMat = new THREE.MeshLambertMaterial({ color: 0x0044ff });
            const legs = new THREE.Mesh(legsGeo, legsMat);
            legs.position.y = -7;
            group.add(legs);

            // Head & Iconic Goggles
            const headGeo = new THREE.BoxGeometry(11, 11, 11);
            const headMat = new THREE.MeshLambertMaterial({ color: 0xffcc99 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 25;
            group.add(head);

            const goggleGeo = new THREE.BoxGeometry(12, 4, 2);
            const goggleMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
            const goggles = new THREE.Mesh(goggleGeo, goggleMat);
            goggles.position.set(0, 1, 5);
            head.add(goggles);

            // Real-time Segmented Cape Geometry for Smooth Flowing Trailing Physics
            const capeGroup = new THREE.Group();
            capeGroup.position.set(0, 18, -5);
            
            const segmentGeo = new THREE.BoxGeometry(16, 6, 1);
            const capeMat = new THREE.MeshLambertMaterial({ color: 0xcc0000, side: THREE.DoubleSide });
            const segments = [];
            
            let lastSegment = capeGroup;
            for(let i=0; i<6; i++) {
                const seg = new THREE.Mesh(segmentGeo, capeMat);
                seg.position.set(0, -3, -0.5);
                const pivot = new THREE.Group();
                pivot.position.set(0, (i === 0 ? 0 : -6), 0);
                pivot.add(seg);
                lastSegment.add(pivot);
                segments.push(pivot);
                lastSegment = pivot;
            }
            group.add(capeGroup);

            // Fists
            const fistGeo = new THREE.BoxGeometry(4, 4, 4);
            const fistMat = new THREE.MeshLambertMaterial({ color: 0xffcc00 });
            const fistL = new THREE.Mesh(fistGeo, fistMat); fistL.position.set(-10, 8, 12); group.add(fistL);
            const fistR = new THREE.Mesh(fistGeo, fistMat); fistR.position.set(10, 8, 12); group.add(fistR);

            // Rainbow Aura Shell for Charge-up Move
            const auraGeo = new THREE.SphereGeometry(30, 16, 16);
            const auraMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, wireframe: true, transparent: true, opacity: 0 });
            const aura = new THREE.Mesh(auraGeo, auraMat);
            group.add(aura);

            group.userData = { capeSegments: segments, head: head, aura: aura, torso: torso };
            return group;
        }

        function createLaserShipMesh() {
            const group = new THREE.Group();
            const bodyGeo = new THREE.CylinderGeometry(0, 12, 35, 4);
            const bodyMat = new THREE.MeshLambertMaterial({ color: 0x111116 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.rotation.x = Math.PI / 2; body.rotation.y = Math.PI / 4;
            
            const line = new THREE.LineSegments(new THREE.EdgesGeometry(bodyGeo), new THREE.LineBasicMaterial({ color: 0x00ffff }));
            line.rotation.x = Math.PI / 2; line.rotation.y = Math.PI / 4;

            group.add(body); group.add(line);
            return group;
        }

        // --- MULTIPLAYER CO-OP SYNC ---
        const peer = new Peer();
        let conn = null; let isHost = false;
        
        peer.on('open', id => document.getElementById('my-id-display').innerText = id);
        peer.on('connection', connection => { conn = connection; isHost = true; setupConnection(); });
        document.getElementById('join-btn').addEventListener('click', () => {
            const friendId = document.getElementById('friend-id').value.trim();
            if (!friendId) return;
            conn = peer.connect(friendId);
            setupConnection();
        });

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('controls').style.display = 'flex';
                document.getElementById('hud').style.display = 'block';
                startGame();
            });

            conn.on('data', data => {
                if (data.type === 'state') {
                    peerPlayer.x = data.px; peerPlayer.z = data.pz; peerPlayer.angle = data.pa; 
                    peerPlayer.chargeTimer = data.pct; peerPlayer.role = data.prole; peerPlayer.isDashing = data.pdash;
                    peerPlayer.isHyperLaser = data.phl;

                    if (!isHost && player.role === 'none') {
                        player.role = data.prole === 'viltrumite' ? 'laser' : 'viltrumite';
                        initPlayerMeshes();
                    }
                    if (data.fired) spawnLaser(peerPlayer.x, peerPlayer.z, peerPlayer.angle, peerPlayer.role === 'viltrumite', data.phl);
                } else if (data.type === 'super_trigger') {
                    triggerSuperBlastAnimation(data.x, data.z);
                }
                if (!isHost && data.type === 'state') {
                    syncEnemies(data.enemies || []);
                    sharedScore = data.score !== undefined ? data.score : sharedScore;
                    player.health = data.p2h;
                }
            });
        }

        // --- INPUT CONTROLS ---
        const keys = { left: false, right: false, gas: false, brake: false };
        const bindBtn = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            el.addEventListener('mousedown', () => keys[key] = true);
            el.addEventListener('mouseup', () => keys[key] = false);
        };
        bindBtn('btn-left', 'left'); bindBtn('btn-right', 'right'); bindBtn('btn-gas', 'gas'); bindBtn('btn-brake', 'brake');
        document.getElementById('btn-super').addEventListener('mousedown', () => trySuper());
        document.getElementById('btn-super').addEventListener('touchstart', (e) => { e.preventDefault(); trySuper(); });
        document.getElementById('btn-fire').addEventListener('mousedown', () => tryFire());
        document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); tryFire(); });

        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
            if(e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
            if(e.key === 'ArrowUp' || e.key === 'w') keys.gas = true;
            if(e.key === 'ArrowDown' || e.key === 's') keys.brake = true;
            if(e.key === ' ') tryFire();
            if(e.key === 'Shift') trySuper();
        });
        window.addEventListener('keyup', e => {
            if(['ArrowLeft','a','ArrowRight','d','ArrowUp','w','ArrowDown','s'].includes(e.key)) keys[e.key==='ArrowUp'||e.key==='w'?'gas':e.key==='ArrowDown'||e.key==='s'?'brake':e.key==='ArrowLeft'||e.key==='a'?'left':'right'] = false;
        });

        // --- PHYSICS & LOGIC MECHANICS ---
        let gameRunning = false; let sharedScore = 0; let clock = new THREE.Clock();
        const player = { x: 0, z: 0, vx: 0, vz: 0, angle: 0, mesh: null, cooldown: 0, health: 100, maxHealth: 100, role: 'none', superCooldown: 0, chargeTimer: 0, hyperLaserTimer: 0, dashTimer: 0 };
        const peerPlayer = { x: -9999, z: -9999, angle: 0, mesh: null, role: 'none', chargeTimer: 0, isHyperLaser: false, isDashing: false };
        let lasers = []; let enemies = []; let blastWaves = [];

        function initPlayerMeshes() {
            player.maxHealth = player.role === 'viltrumite' ? 800 : 200; player.health = player.maxHealth;
            if (player.role === 'viltrumite') {
                player.mesh = createViltrumiteMesh(); peerPlayer.mesh = createLaserShipMesh();
                document.getElementById('btn-fire').innerText = "CLAP";
                let brk = document.getElementById('btn-brake'); brk.innerText = "DASH"; brk.className = "btn btn-dash";
            } else {
                player.mesh = createLaserShipMesh(); peerPlayer.mesh = createViltrumiteMesh();
            }
            scene.add(player.mesh); scene.add(peerPlayer.mesh);
        }

        function tryFire() {
            if (player.cooldown <= 0 && player.chargeTimer <= 0) {
                spawnLaser(player.x, player.z, player.angle, player.role === 'viltrumite', player.hyperLaserTimer > 0);
                player.justFired = true;
                player.cooldown = player.hyperLaserTimer > 0 ? 5 : (player.role === 'viltrumite' ? 20 : 15);
            }
        }

        function trySuper() {
            if (player.superCooldown <= 0 && player.chargeTimer <= 0 && player.role !== 'none') {
                if (player.role === 'viltrumite') {
                    player.chargeTimer = 120; // Initiates the 2-second epic multi-color tracking sequence
                } else {
                    player.hyperLaserTimer = 300;
                }
                player.superCooldown = 900;
            }
        }

        function triggerSuperBlastAnimation(x, z) {
            const geo = new THREE.SphereGeometry(10, 32, 32);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.8, wireframe: true });
            const blastMesh = new THREE.Mesh(geo, mat);
            blastMesh.position.set(x, 0, z);
            scene.add(blastMesh);
            blastWaves.push({ mesh: blastMesh, radius: 10, maxRadius: 1600, frame: 45 });
        }

        function spawnLaser(x, z, angle, isViltrumite, isHyper) {
            let geo, mat;
            if (isViltrumite) {
                geo = new THREE.TorusGeometry(30, 3, 8, 24, Math.PI);
                mat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
            } else {
                geo = new THREE.CylinderGeometry(isHyper ? 8 : 2, isHyper ? 8 : 2, isHyper ? 100 : 30, 4);
                mat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            }
            const m = new THREE.Mesh(geo, mat);
            m.rotation.x = Math.PI / 2; m.rotation.z = angle + (isViltrumite ? Math.PI/2 : 0);
            m.position.set(x + Math.sin(angle)*25, 0, z + Math.cos(angle)*25);
            scene.add(m);
            lasers.push({ mesh: m, x: m.position.x, z: m.position.z, vx: Math.sin(angle)*25, vz: Math.cos(angle)*25, isClap: isViltrumite, isHyper: isHyper, age: 0 });
        }

        function createEnemyMesh(type) {
            let m = new THREE.Mesh(
                type === 'brute' ? new THREE.BoxGeometry(35, 35, 35) : new THREE.ConeGeometry(10, 25, 4),
                new THREE.MeshLambertMaterial({ color: type === 'brute' ? 0x9900ff : 0xff0055 })
            );
            scene.add(m); return m;
        }

        function syncEnemies(serverData) {
            while (enemies.length < serverData.length) {
                let d = serverData[enemies.length];
                enemies.push({ id: d.id, type: d.type, size: d.size, mesh: createEnemyMesh(d.type) });
            }
            while (enemies.length > serverData.length) { scene.remove(enemies.pop().mesh); }
            for(let i=0; i<serverData.length; i++) {
                enemies[i].mesh.position.set(serverData[i].x, 0, serverData[i].z);
            }
        }

        function update() {
            const time = clock.getElapsedTime();
            let isFearFreeze = player.chargeTimer > 0 || peerPlayer.chargeTimer > 0;

            if (player.chargeTimer > 0) {
                player.chargeTimer--;
                player.vx *= 0.7; player.vz *= 0.7;
                if (player.chargeTimer === 1) {
                    triggerSuperBlastAnimation(player.x, player.z);
                    if (conn && conn.open) conn.send({ type: 'super_trigger', x: player.x, z: player.z });
                }
            } else if (player.role === 'viltrumite' && keys.brake && player.dashTimer <= 0) {
                player.dashTimer = 15;
            } else if (player.dashTimer > 0) {
                player.dashTimer--;
                player.vx = Math.sin(player.angle) * 40; player.vz = Math.cos(player.angle) * 40;
            } else {
                let turn = player.role === 'viltrumite' ? 0.11 : 0.06;
                let acc = player.role === 'viltrumite' ? 1.2 : 0.6;
                if (keys.left) player.angle += turn; if (keys.right) player.angle -= turn;
                if (keys.gas) { player.vx += Math.sin(player.angle)*acc; player.vz += Math.cos(player.angle)*acc; }
                let decay = (player.role === 'laser' && keys.brake) ? 0.78 : 0.94;
                player.vx *= decay; player.vz *= decay;
            }

            player.x += player.vx; player.z += player.vz;
            if(player.cooldown > 0) player.cooldown--;
            if(player.superCooldown > 0) player.superCooldown--;
            if(player.hyperLaserTimer > 0) player.hyperLaserTimer--;

            // --- ANIMATION ENGINE REWORK ---
            if (player.mesh) {
                player.mesh.position.set(player.x, 0, player.z);
                player.mesh.rotation.y = player.angle;
                const speed = Math.hypot(player.vx, player.vz);

                if (player.role === 'viltrumite') {
                    const ud = player.mesh.userData;
                    
                    // FIXED CAPE PHYSICS: Follows trailing velocity vector correctly, flowing backward horizontally
                    let segmentWave = Math.sin(time * 22 + speed * 0.1) * (0.12 + speed * 0.015);
                    ud.capeSegments.forEach((seg, index) => {
                        seg.rotation.z = segmentWave * 0.7; // Wind flutter lateral
                        seg.rotation.x = (Math.PI / 8) + (speed * 0.03) + (Math.cos(time * 15 + index) * 0.05); // Trailing velocity angle
                    });

                    // Charging Super Move Animation Loop
                    if (player.chargeTimer > 0) {
                        ud.aura.material.opacity = 0.7 + Math.sin(time * 30) * 0.2;
                        // Multi-color strobe phase shift
                        ud.aura.material.color.setHSL((time * 3) % 1.0, 1.0, 0.6);
                        ud.torso.position.y = 10 + Math.sin(time * 40) * 1.5; // Vibrating transformation tracking
                    } else {
                        ud.aura.material.opacity = 0;
                        ud.torso.position.y = 10;
                    }
                } else {
                    player.mesh.position.y = Math.sin(time * 6) * 3;
                    player.mesh.rotation.z = -player.vx * 0.04;
                }
            }

            // Sync Peer Render Matrix
            if (peerPlayer.mesh) {
                peerPlayer.mesh.position.set(peerPlayer.x, 0, peerPlayer.z);
                peerPlayer.mesh.rotation.y = peerPlayer.angle;
                if (peerPlayer.role === 'viltrumite') {
                    const ud = peerPlayer.mesh.userData;
                    let pSpeed = isFearFreeze ? 0 : 10;
                    ud.capeSegments.forEach((seg) => {
                        seg.rotation.x = (Math.PI / 8) + (Math.sin(time * 20) * 0.1);
                    });
                    if (peerPlayer.chargeTimer > 0) {
                        ud.aura.material.opacity = 0.7;
                        ud.aura.material.color.setHSL((time * 3) % 1.0, 1.0, 0.6);
                    } else { ud.aura.material.opacity = 0; }
                } else {
                    peerPlayer.mesh.position.y = Math.sin(time * 6) * 3;
                }
            }

            // Blastwaves & Screen-shake/Impact Frame Inversion Processing
            let isExploding = false;
            for(let i=blastWaves.length-1; i>=0; i--) {
                let b = blastWaves[i];
                b.radius += (b.maxRadius - b.radius) * 0.18;
                b.mesh.scale.setScalar(b.radius / 10);
                b.frame--;
                if (b.frame > 40) isExploding = true; // High-intensity flash trigger frame range
                
                if (isHost) {
                    for(let j=enemies.length-1; j>=0; j--) {
                        if (Math.hypot(b.mesh.position.x - enemies[j].mesh.position.x, b.mesh.position.z - enemies[j].mesh.position.z) < b.radius) {
                            scene.remove(enemies[j].mesh); enemies.splice(j, 1); sharedScore += 50;
                        }
                    }
                }
                if (b.frame <= 0) { scene.remove(b.mesh); blastWaves.splice(i, 1); }
            }

            // Dynamic Camera Control: Zooms out during charging, shakes on impact frames
            let targetCamDist = isFearFreeze ? 650 : 450;
            let targetCamHeight = isFearFreeze ? 450 : 320;
            const camOffset = new THREE.Vector3(-Math.sin(player.angle)*targetCamDist, targetCamHeight, -Math.cos(player.angle)*targetCamDist);
            let desiredCamPos = new THREE.Vector3(player.x, 0, player.z).add(camOffset);
            
            if (isExploding || player.dashTimer > 0) {
                desiredCamPos.x += (Math.random()-0.5)*28;
                desiredCamPos.y += (Math.random()-0.5)*28;
                overlay.style.display = (tick % 4 < 2) ? 'block' : 'none'; // Flashes inverted impact frame overlays
            } else {
                overlay.style.display = 'none';
            }
            camera.position.lerp(desiredCamPos, 0.08);
            camera.lookAt(player.x, 0, player.z);
            pointLight.position.set(player.x, 80, player.z);

            // Lasers Processing Loop
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i]; l.x += l.vx; l.z += l.vz; l.mesh.position.set(l.x, 0, l.z); l.age++;
                if (l.age > (l.isHyper ? 45 : (l.isClap ? 40 : 90))) { scene.remove(l.mesh); lasers.splice(i, 1); continue; }
                if (isHost) {
                    for(let j=enemies.length-1; j>=0; j--) {
                        if (Math.hypot(l.x - enemies[j].mesh.position.x, l.z - enemies[j].mesh.position.z) < enemies[j].size + 15) {
                            enemies[j].hp -= (l.isHyper ? 5 : (l.isClap ? 3 : 1));
                            if (enemies[j].hp <= 0) { scene.remove(enemies[j].mesh); sharedScore += 100; enemies.splice(j, 1); }
                            if (!l.isHyper && !l.isClap) { scene.remove(l.mesh); lasers.splice(i, 1); break; }
                        }
                    }
                }
            }

            // Host Enemy Processing
            if (isHost) {
                if (Math.random() < 0.05 && enemies.length < 35 && !isFearFreeze) {
                    let t = Math.random() > 0.5 ? player : peerPlayer;
                    let type = Math.random() > 0.82 ? 'brute' : 'drone';
                    enemies.push({ id: Math.random(), type: type, size: type==='brute'?35:15, hp: type==='brute'?5:1, speed: type==='brute'?1.8:5, x: t.x + Math.sin(Math.random()*Math.PI*2)*1100, z: t.z + Math.cos(Math.random()*Math.PI*2)*1100, targetId: t === player ? 'host' : 'client' });
                }
                if (!isFearFreeze) {
                    for(let i=enemies.length-1; i>=0; i--) {
                        let e = enemies[i]; let target = e.targetId==='host'?player:peerPlayer;
                        let ang = Math.atan2(target.x - e.x, target.z - e.z);
                        e.x += Math.sin(ang)*e.speed; e.z += Math.cos(ang)*e.speed;
                        
                        // Collision checks
                        if (Math.hypot(player.x - e.x, player.z - e.z) < e.size + 15) {
                            if (player.role === 'viltrumite') { sharedScore += 50; } else { player.health -= (e.type==='brute'?40:15); }
                            scene.remove(e.mesh); enemies.splice(i, 1);
                        } else if (Math.hypot(peerPlayer.x - e.x, peerPlayer.z - e.z) < e.size + 15) {
                            if (peerPlayer.role === 'viltrumite') { sharedScore += 50; } else { peerPlayer.health -= (e.type==='brute'?40:15); }
                            scene.remove(e.mesh); enemies.splice(i, 1);
                        }
                    }
                }
            }

            if (player.health <= 0) {
                player.health = player.maxHealth; player.x = 0; player.z = 0; player.vx = 0; player.vz = 0;
                sharedScore = Math.max(0, sharedScore - 500);
            }

            document.getElementById('scoreDisplay').innerText = sharedScore;
            document.getElementById('health-bar').style.width = Math.max(0, (player.health / player.maxHealth) * 100) + "%";

            // Network Packet Assembly
            if (conn && conn.open) {
                let packet = { type: 'state', px: player.x, pz: player.z, pa: player.angle, prole: player.role, pct: player.chargeTimer, pdash: player.dashTimer > 0, phl: player.hyperLaserTimer > 0, fired: player.justFired };
                if (isHost) { packet.enemies = enemies.map(e => ({ id: e.id, type: e.type, size: e.size, x: e.x, z: e.z })); packet.score = sharedScore; packet.p2h = peerPlayer.health; }
                conn.send(packet); player.justFired = false;
            }
        }

        let tick = 0;
        function loop() { if (!gameRunning) return; tick++; update(); renderer.render(scene, camera); requestAnimationFrame(loop); }
        function startGame() { 
            gameRunning = true; player.x = isHost ? -100 : 100;
            if (isHost) { player.role = Math.random() > 0.5 ? 'viltrumite' : 'laser'; initPlayerMeshes(); }
            requestAnimationFrame(loop); 
        }
    </script>
</body>
</html>
