<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Vanguard: Full 3D</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050510; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; touch-action: none;
        }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* UI Elements (Z-Index ensures they float above the 3D canvas) */
        #menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 20, 0.9); padding: 30px;
            border: 2px solid #0ff; border-radius: 15px; box-shadow: 0 0 20px #0ff;
            text-align: center; width: 320px; z-index: 10;
        }
        h2 { color: #f0f; text-shadow: 0 0 10px #f0f; margin-top: 0; }
        input, button {
            width: 90%; padding: 12px; margin: 10px 0; background: #111; color: #0ff;
            border: 1px solid #0ff; border-radius: 8px; font-family: inherit; font-size: 16px;
        }
        button { cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { background: #0ff; color: #000; }
        #my-id-display { font-weight: bold; color: #f0f; margin-bottom: 15px; word-break: break-all; }

        #hud {
            position: absolute; top: 20px; left: 0; width: 100%;
            text-align: center; font-size: 20px; font-weight: bold;
            color: #fff; text-shadow: 0 0 10px #fff; pointer-events: none;
            display: none; z-index: 10;
        }
        .health-bar-container { width: 200px; height: 15px; border: 2px solid #fff; margin: 10px auto; border-radius: 10px; overflow: hidden; }
        #health-bar { width: 100%; height: 100%; background: #0f0; transition: width 0.2s, background 0.2s; }

        #controls {
            position: absolute; bottom: 30px; left: 0; width: 100%;
            display: none; justify-content: space-between; padding: 0 20px; box-sizing: border-box;
            pointer-events: none; z-index: 10;
        }
        .control-group { display: flex; gap: 15px; pointer-events: auto; }
        .control-group-col { display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .btn {
            width: 65px; height: 65px; border-radius: 50%;
            background: rgba(0, 255, 255, 0.1); border: 2px solid #0ff;
            color: #0ff; font-weight: bold; display: flex; align-items: center; justify-content: center; user-select: none;
        }
        .btn:active { background: rgba(0, 255, 255, 0.5); }
        .btn-action { border-color: #f0f; color: #f0f; }
        .btn-brake { border-color: #ff3333; color: #ff3333; }
        .btn-dash { border-color: #ffaa00; color: #ffaa00; background: rgba(255, 170, 0, 0.1); }
    </style>
</head>
<body>

    <div id="menu">
        <h2>3D CO-OP VANGUARD</h2>
        <p>Your Link ID:</p>
        <div id="my-id-display">Generating Link...</div>
        <input type="text" id="friend-id" placeholder="Wingman's ID">
        <button id="join-btn">Initiate Link</button>
        <p id="status"></p>
    </div>

    <div id="hud">
        SCORE: <span id="scoreDisplay">0</span>
        <div class="health-bar-container"><div id="health-bar"></div></div>
    </div>

    <div id="controls">
        <div class="control-group" style="align-items: flex-end;">
            <div class="btn" id="btn-left">◀</div>
            <div class="btn" id="btn-right">▶</div>
        </div>
        <div class="control-group">
            <div class="control-group-col">
                <div class="btn btn-action" id="btn-fire">FIRE</div>
                <div class="btn btn-brake" id="btn-brake">STOP</div>
            </div>
            <div class="btn" style="width: 80px; height: 140px; border-radius: 40px;" id="btn-gas">GAS</div>
        </div>
    </div>

    <div id="game-container"></div>

    <script>
        // --- THREE.JS 3D ENGINE SETUP ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.001);

        // Isometric-style trailing camera
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 2); 
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x00ffff, 1.5, 1000);
        scene.add(pointLight);

        // Neon Grid Floor
        const gridHelper = new THREE.GridHelper(4000, 40, 0x00ffff, 0x003333);
        gridHelper.position.y = -20;
        scene.add(gridHelper);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 3D MESH GENERATORS ---
        function createViltrumiteMesh() {
            const group = new THREE.Group();
            
            // Torso (Yellow)
            const torsoGeo = new THREE.BoxGeometry(16, 20, 10);
            const torsoMat = new THREE.MeshLambertMaterial({ color: 0xffcc00 });
            const torso = new THREE.Mesh(torsoGeo, torsoMat);
            torso.position.y = 10;
            group.add(torso);

            // Legs (Blue)
            const legGeo = new THREE.BoxGeometry(14, 15, 8);
            const legMat = new THREE.MeshLambertMaterial({ color: 0x0044ff });
            const legs = new THREE.Mesh(legGeo, legMat);
            legs.position.y = -8;
            group.add(legs);

            // Head
            const headGeo = new THREE.BoxGeometry(12, 12, 12);
            const headMat = new THREE.MeshLambertMaterial({ color: 0xffcc99 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 26;
            group.add(head);

            // Flowing Hair (Attached to head)
            const hairGeo = new THREE.ConeGeometry(5, 15, 4);
            const hairMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const hair1 = new THREE.Mesh(hairGeo, hairMat);
            hair1.position.set(-4, 6, -5);
            hair1.rotation.x = -Math.PI / 4;
            const hair2 = new THREE.Mesh(hairGeo, hairMat);
            hair2.position.set(4, 6, -5);
            hair2.rotation.x = -Math.PI / 4;
            head.add(hair1);
            head.add(hair2);

            // Flowing Cape
            const capeGeo = new THREE.PlaneGeometry(20, 40);
            const capeMat = new THREE.MeshLambertMaterial({ color: 0xff0000, side: THREE.DoubleSide });
            const cape = new THREE.Mesh(capeGeo, capeMat);
            cape.position.set(0, 10, -8);
            cape.rotation.x = -Math.PI / 6;
            group.add(cape);

            // Fists
            const fistGeo = new THREE.SphereGeometry(4, 8, 8);
            const fistMat = new THREE.MeshLambertMaterial({ color: 0xffcc00 });
            const fistL = new THREE.Mesh(fistGeo, fistMat);
            fistL.position.set(-12, 10, 10);
            const fistR = new THREE.Mesh(fistGeo, fistMat);
            fistR.position.set(12, 10, 10);
            group.add(fistL);
            group.add(fistR);

            group.userData = { cape: cape, head: head, hair1: hair1, hair2: hair2 };
            return group;
        }

        function createLaserShipMesh() {
            const group = new THREE.Group();
            
            const bodyGeo = new THREE.CylinderGeometry(0, 15, 40, 4);
            const bodyMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.rotation.x = Math.PI / 2; // Point forward
            body.rotation.y = Math.PI / 4; // Diamond shape
            
            // Neon outlines
            const edges = new THREE.EdgesGeometry(bodyGeo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00ffff }));
            line.rotation.x = Math.PI / 2;
            line.rotation.y = Math.PI / 4;

            group.add(body);
            group.add(line);
            return group;
        }

        // --- P2P NETWORK SETUP ---
        const peer = new Peer();
        let conn = null; let isHost = false;
        
        peer.on('open', id => document.getElementById('my-id-display').innerText = id);
        peer.on('connection', connection => { conn = connection; isHost = true; setupConnection(); });

        document.getElementById('join-btn').addEventListener('click', () => {
            const friendId = document.getElementById('friend-id').value.trim();
            if (!friendId) return;
            document.getElementById('status').innerText = "Linking...";
            conn = peer.connect(friendId);
            setupConnection();
        });

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('controls').style.display = 'flex';
                document.getElementById('hud').style.display = 'block';
                startGame();
            });

            conn.on('data', data => {
                if (data.type === 'state') {
                    peerPlayer.x = data.px; peerPlayer.z = data.pz;
                    peerPlayer.angle = data.pa; 
                    peerPlayer.role = data.prole;

                    // Initialize meshes if roles are assigned
                    if (!isHost && player.role === 'none') {
                        player.role = data.prole === 'viltrumite' ? 'laser' : 'viltrumite';
                        initPlayerMeshes();
                    }

                    if (data.fired) spawnLaser(peerPlayer.x, peerPlayer.z, peerPlayer.angle, peerPlayer.role === 'viltrumite');
                    
                    if (!isHost) {
                        syncEnemies(data.enemies || []);
                        sharedScore = data.score !== undefined ? data.score : sharedScore;
                        player.health = data.p2h;
                    }
                }
            });
        }

        // --- INPUT HANDLING ---
        const keys = { left: false, right: false, gas: false, brake: false, fire: false };
        const bindBtn = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            el.addEventListener('mousedown', () => keys[key] = true);
            el.addEventListener('mouseup', () => keys[key] = false);
        };
        bindBtn('btn-left', 'left'); bindBtn('btn-right', 'right');
        bindBtn('btn-gas', 'gas'); bindBtn('btn-brake', 'brake'); 
        
        document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); tryFire(); });
        document.getElementById('btn-fire').addEventListener('mousedown', () => tryFire());

        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
            if(e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
            if(e.key === 'ArrowUp' || e.key === 'w') keys.gas = true;
            if(e.key === 'ArrowDown' || e.key === 's') keys.brake = true;
            if(e.key === ' ') tryFire();
        });
        window.addEventListener('keyup', e => {
            if(['ArrowLeft','a','ArrowRight','d','ArrowUp','w','ArrowDown','s'].includes(e.key)) keys[e.key==='ArrowUp'||e.key==='w'?'gas':e.key==='ArrowDown'||e.key==='s'?'brake':e.key==='ArrowLeft'||e.key==='a'?'left':'right'] = false;
        });

        // --- GAME ENTITIES (3D coordinates use X and Z) ---
        let gameRunning = false; let sharedScore = 0; let clock = new THREE.Clock();
        
        const player = { 
            x: 0, z: 0, vx: 0, vz: 0, angle: 0, mesh: null, 
            isThrusting: false, justFired: false, cooldown: 0,
            health: 100, maxHealth: 100, role: 'none'
        };
        const peerPlayer = { x: -9999, z: -9999, angle: 0, mesh: null, role: 'none' };
        
        let lasers = []; let enemies = [];

        function initPlayerMeshes() {
            // Apply Stats
            player.maxHealth = player.role === 'viltrumite' ? 800 : 200;
            player.health = player.maxHealth;

            if (player.role === 'viltrumite') {
                player.mesh = createViltrumiteMesh();
                peerPlayer.mesh = createLaserShipMesh();
                document.getElementById('btn-fire').innerText = "CLAP";
                document.getElementById('btn-brake').innerText = "DASH";
                document.getElementById('btn-brake').className = "btn btn-dash"; 
            } else {
                player.mesh = createLaserShipMesh();
                peerPlayer.mesh = createViltrumiteMesh();
            }
            scene.add(player.mesh);
            scene.add(peerPlayer.mesh);
        }

        function tryFire() {
            if (player.cooldown <= 0) {
                spawnLaser(player.x, player.z, player.angle, player.role === 'viltrumite');
                player.justFired = true;
                player.cooldown = player.role === 'viltrumite' ? 20 : 15;
            }
        }

        function spawnLaser(x, z, angle, isViltrumite) {
            let mesh;
            if (isViltrumite) {
                // Sonic Clap (Wide 3D crescent using a squashed torus)
                const geo = new THREE.TorusGeometry(20, 2, 8, 24, Math.PI);
                const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                mesh = new THREE.Mesh(geo, mat);
                mesh.rotation.x = Math.PI / 2;
                mesh.rotation.z = angle;
            } else {
                // Standard Neon Laser
                const geo = new THREE.SphereGeometry(4, 8, 8);
                const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
                mesh = new THREE.Mesh(geo, mat);
            }
            
            // Offset spawn point
            mesh.position.set(x + Math.sin(angle)*30, 0, z + Math.cos(angle)*30);
            scene.add(mesh);

            lasers.push({
                mesh: mesh,
                x: mesh.position.x, z: mesh.position.z,
                vx: Math.sin(angle) * (isViltrumite ? 25 : 30),
                vz: Math.cos(angle) * (isViltrumite ? 25 : 30),
                isClap: isViltrumite, age: 0
            });
        }

        // Create 3D Enemies
        function createEnemyMesh(type) {
            let mesh;
            if (type === 'brute') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(40, 40, 40), new THREE.MeshLambertMaterial({ color: 0xa020f0 }));
            } else {
                mesh = new THREE.Mesh(new THREE.TetrahedronGeometry(15), new THREE.MeshLambertMaterial({ color: 0xff0000 }));
            }
            scene.add(mesh);
            return mesh;
        }

        function syncEnemies(serverEnemies) {
            // Match local meshes to server data (simplified for this demo)
            while (enemies.length < serverEnemies.length) {
                let eData = serverEnemies[enemies.length];
                enemies.push({ id: eData.id, type: eData.type, size: eData.size, mesh: createEnemyMesh(eData.type) });
            }
            while (enemies.length > serverEnemies.length) {
                let e = enemies.pop();
                scene.remove(e.mesh);
            }
            // Update positions
            for(let i=0; i<serverEnemies.length; i++) {
                enemies[i].mesh.position.set(serverEnemies[i].x, 0, serverEnemies[i].z);
            }
        }

        function update() {
            const time = clock.getElapsedTime();

            let turnSpeed = player.role === 'viltrumite' ? 0.08 : 0.05; 
            let accel = player.role === 'viltrumite' ? 1.5 : 0.8; 

            if (keys.left) player.angle += turnSpeed; // In 3D space, + angle turns left
            if (keys.right) player.angle -= turnSpeed;

            // Dashing Logic (Viltrumite)
            if (player.role === 'viltrumite' && keys.brake) {
                player.vx = Math.sin(player.angle) * 35; 
                player.vz = Math.cos(player.angle) * 35;
            } else {
                player.isThrusting = keys.gas;
                if (keys.gas) { 
                    player.vx += Math.sin(player.angle) * accel; 
                    player.vz += Math.cos(player.angle) * accel; 
                }
                
                if (player.role === 'laser' && keys.brake) { 
                    player.vx *= 0.80; player.vz *= 0.80; 
                } else { 
                    player.vx *= 0.95; player.vz *= 0.95; 
                }
            }

            player.x += player.vx; player.z += player.vz;
            if(player.cooldown > 0) player.cooldown--;

            // Update Player Mesh & Procedural Animations
            if (player.mesh) {
                player.mesh.position.set(player.x, 0, player.z);
                player.mesh.rotation.y = player.angle;

                // FLUID ANIMATION: The Viltrumite's Cape & Hair physics
                if (player.role === 'viltrumite') {
                    const speed = Math.hypot(player.vx, player.vz);
                    const userData = player.mesh.userData;
                    
                    // Cape flaps faster the faster you move
                    userData.cape.rotation.x = -Math.PI / 6 + Math.sin(time * 15) * (0.2 + speed * 0.02);
                    
                    // Hair flows back based on speed
                    userData.hair1.rotation.x = -Math.PI / 4 - (speed * 0.05) + Math.sin(time * 10) * 0.1;
                    userData.hair2.rotation.x = -Math.PI / 4 - (speed * 0.05) + Math.cos(time * 10) * 0.1;

                    // Body leans into the movement
                    player.mesh.rotation.x = speed * 0.02; 
                } else {
                    // Ship hovering animation
                    player.mesh.position.y = Math.sin(time * 5) * 5;
                    player.mesh.rotation.z = -player.vx * 0.05; // Bank into turns
                }
            }

            // Sync Peer Mesh
            if (peerPlayer.mesh) {
                peerPlayer.mesh.position.set(peerPlayer.x, 0, peerPlayer.z);
                peerPlayer.mesh.rotation.y = peerPlayer.angle;
                // Basic peer animation
                if (peerPlayer.role === 'viltrumite') {
                    peerPlayer.mesh.userData.cape.rotation.x = -Math.PI / 6 + Math.sin(time * 15) * 0.3;
                } else {
                    peerPlayer.mesh.position.y = Math.sin(time * 5) * 5;
                }
            }

            // Move Lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i]; 
                l.x += l.vx; l.z += l.vz; 
                l.mesh.position.set(l.x, 0, l.z);
                l.age++;
                if (l.age > (l.isClap ? 40 : 100)) { 
                    scene.remove(l.mesh);
                    lasers.splice(i, 1); 
                }
            }

            // Host Enemy Logic
            if (isHost) {
                if (Math.random() < 0.05 && enemies.length < 30) {
                    let t = Math.random() > 0.5 ? player : peerPlayer;
                    let type = Math.random() > 0.8 ? 'brute' : 'drone';
                    let e = { 
                        id: Math.random(), type: type, 
                        size: type === 'brute' ? 30 : 15, 
                        hp: type === 'brute' ? 5 : 1, speed: type === 'brute' ? 2 : 5,
                        x: t.x + Math.sin(Math.random()*Math.PI*2)*1200, 
                        z: t.z + Math.cos(Math.random()*Math.PI*2)*1200, 
                        targetId: t === player ? 'host' : 'client' 
                    };
                    e.mesh = createEnemyMesh(e.type);
                    enemies.push(e);
                }

                for(let i = enemies.length - 1; i >= 0; i--) {
                    let e = enemies[i];
                    let target = e.targetId === 'host' ? player : peerPlayer;
                    let angle = Math.atan2(target.x - e.x, target.z - e.z); // Note: Z and X for 3D atan2
                    e.x += Math.sin(angle) * e.speed; e.z += Math.cos(angle) * e.speed;
                    e.mesh.position.set(e.x, 0, e.z);
                    e.mesh.rotation.y = angle;
                    if (e.type === 'drone') e.mesh.rotation.x += 0.1; // Drones tumble

                    // Laser Collision Check
                    for (let j = lasers.length - 1; j >= 0; j--) {
                        if (Math.hypot(lasers[j].x - e.x, lasers[j].z - e.z) < e.size + 15) {
                            e.hp -= lasers[j].isClap ? 3 : 1;
                            if (e.hp <= 0) {
                                scene.remove(e.mesh);
                                sharedScore += (e.type === 'brute' ? 150 : 50);
                                enemies.splice(i, 1); break;
                            }
                            if (!lasers[j].isClap) {
                                scene.remove(lasers[j].mesh);
                                lasers.splice(j, 1);
                            }
                        }
                    }
                }
            }

            // Camera Tracking (Trailing 3rd Person View)
            const camOffset = new THREE.Vector3(
                -Math.sin(player.angle) * 400, // Move back
                300,                           // Move up
                -Math.cos(player.angle) * 400
            );
            camera.position.lerp(new THREE.Vector3(player.x, 0, player.z).add(camOffset), 0.1);
            camera.lookAt(player.x, 0, player.z);
            pointLight.position.set(player.x, 100, player.z); // Light follows player

            // UI
            document.getElementById('scoreDisplay').innerText = sharedScore;
            document.getElementById('health-bar').style.width = Math.max(0, (player.health / player.maxHealth) * 100) + "%";

            // Networking
            if (conn && conn.open) {
                let packet = {
                    type: 'state', px: player.x, pz: player.z, pa: player.angle, 
                    prole: player.role, fired: player.justFired
                };
                if (isHost) { 
                    packet.enemies = enemies.map(e => ({ id: e.id, type: e.type, size: e.size, x: e.x, z: e.z })); 
                    packet.score = sharedScore; packet.p2h = peerPlayer.health; 
                }
                conn.send(packet);
                player.justFired = false;
            }
        }

        function loop() { 
            if (!gameRunning) return; 
            update(); 
            renderer.render(scene, camera);
            requestAnimationFrame(loop); 
        }
        
        function startGame() { 
            gameRunning = true; 
            player.x = isHost ? -100 : 100; 
            if (isHost) {
                player.role = Math.random() > 0.5 ? 'viltrumite' : 'laser';
                initPlayerMeshes();
            }
            requestAnimationFrame(loop); 
        }
    </script>
</body>
</html>
