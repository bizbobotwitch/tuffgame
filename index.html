<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Vanguard: Asymmetric Co-Op</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050510; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; touch-action: none;
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        #menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 20, 0.9); padding: 30px;
            border: 2px solid #0ff; border-radius: 15px; box-shadow: 0 0 20px #0ff;
            text-align: center; width: 320px; z-index: 10;
        }
        h2 { color: #f0f; text-shadow: 0 0 10px #f0f; margin-top: 0; }
        input, button {
            width: 90%; padding: 12px; margin: 10px 0; background: #111; color: #0ff;
            border: 1px solid #0ff; border-radius: 8px; font-family: inherit; font-size: 16px;
        }
        button { cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { background: #0ff; color: #000; }
        #my-id-display { font-weight: bold; color: #f0f; margin-bottom: 15px; word-break: break-all; }

        #hud {
            position: absolute; top: 20px; left: 0; width: 100%;
            text-align: center; font-size: 20px; font-weight: bold;
            color: #fff; text-shadow: 0 0 10px #fff; pointer-events: none;
            display: none; z-index: 5;
        }
        .health-bar-container {
            width: 200px; height: 15px; border: 2px solid #fff; 
            margin: 10px auto; border-radius: 10px; overflow: hidden;
        }
        #health-bar { width: 100%; height: 100%; background: #0f0; transition: width 0.2s, background 0.2s; }
        .hud-text { font-size: 16px; margin-top: 5px; text-shadow: 0 0 5px currentColor; }

        #controls {
            position: absolute; bottom: 30px; left: 0; width: 100%;
            display: none; justify-content: space-between; padding: 0 20px; box-sizing: border-box;
            pointer-events: none; z-index: 5;
        }
        .control-group { display: flex; gap: 15px; pointer-events: auto; }
        .control-group-col { display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .btn {
            width: 65px; height: 65px; border-radius: 50%;
            background: rgba(0, 255, 255, 0.1); border: 2px solid #0ff;
            color: #0ff; font-weight: bold; display: flex;
            align-items: center; justify-content: center; user-select: none;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn:active { background: rgba(0, 255, 255, 0.5); }
        .btn-action { border-color: #f0f; color: #f0f; }
        .btn-super { border-color: #ffaa00; color: #ffaa00; box-shadow: 0 0 15px currentColor; display: none; }
        .btn-super:active { background: rgba(255, 170, 0, 0.5); }
        .btn-brake { border-color: #ff3333; color: #ff3333; }
    </style>
</head>
<body>

    <div id="menu">
        <h2>ASYMMETRIC CO-OP</h2>
        <p>Your Link ID:</p>
        <div id="my-id-display">Generating Link...</div>
        <p>Roles are assigned at 50/50 randomly upon connection.</p>
        <input type="text" id="friend-id" placeholder="Wingman's ID">
        <button id="join-btn">Initiate Link</button>
        <p id="status"></p>
    </div>

    <div id="hud">
        SCORE: <span id="scoreDisplay">0</span>
        <div class="health-bar-container"><div id="health-bar"></div></div>
        <div id="super-text" class="hud-text" style="color: #888; display: none;">LINKING POWERS...</div>
    </div>

    <div id="controls">
        <div class="control-group" style="align-items: flex-end;">
            <div class="btn" id="btn-left">◀</div>
            <div class="btn" id="btn-right">▶</div>
        </div>
        <div class="control-group">
            <div class="control-group-col">
                <div class="btn btn-super" id="btn-super">SUPER</div>
                <div class="btn btn-action" id="btn-fire">FIRE</div>
                <div class="btn btn-brake" id="btn-brake">STOP</div>
            </div>
            <div class="btn" style="width: 80px; height: 140px; border-radius: 40px;" id="btn-gas">GAS</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });

        // --- P2P NETWORK SETUP ---
        const peer = new Peer();
        let conn = null; let isHost = false;
        
        peer.on('open', id => document.getElementById('my-id-display').innerText = id);
        peer.on('connection', connection => { conn = connection; isHost = true; setupConnection(); });

        document.getElementById('join-btn').addEventListener('click', () => {
            const friendId = document.getElementById('friend-id').value.trim();
            if (!friendId) return;
            document.getElementById('status').innerText = "Linking...";
            conn = peer.connect(friendId);
            setupConnection();
        });

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('controls').style.display = 'flex';
                document.getElementById('hud').style.display = 'block';
                player.color = isHost ? '#0ff' : '#f0f';
                startGame();
            });

            conn.on('data', data => {
                if (data.type === 'state') {
                    peerPlayer.x = data.px; peerPlayer.y = data.py;
                    peerPlayer.angle = data.pa; peerPlayer.color = data.pc;
                    peerPlayer.isThrusting = data.pt; 
                    peerPlayer.chargeTimer = data.pct; 
                    peerPlayer.isHyperLaser = data.phl;
                    peerPlayer.role = data.prole;

                    // Role Assignment for Client
                    if (!isHost && player.role === 'none') {
                        player.role = data.prole === 'viltrumite' ? 'laser' : 'viltrumite';
                        applyRoleStats(player);
                    }

                    if (data.fired) spawnLaser(peerPlayer.x, peerPlayer.y, peerPlayer.angle, peerPlayer.color, false, data.phl);
                    
                    if (!isHost) {
                        enemies = data.enemies || [];
                        sharedScore = data.score !== undefined ? data.score : sharedScore;
                        player.health = data.p2h;
                    }
                } else if (data.type === 'super_trigger') {
                    triggerSuperAnimation(data.x, data.y);
                }
            });
        }

        // --- INPUT HANDLING ---
        const keys = { left: false, right: false, gas: false, brake: false, fire: false };
        const bindBtn = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            el.addEventListener('mousedown', () => keys[key] = true);
            el.addEventListener('mouseup', () => keys[key] = false);
        };
        bindBtn('btn-left', 'left'); bindBtn('btn-right', 'right');
        bindBtn('btn-gas', 'gas'); bindBtn('btn-brake', 'brake'); 
        
        document.getElementById('btn-super').addEventListener('touchstart', (e) => { e.preventDefault(); trySuper(); });
        document.getElementById('btn-super').addEventListener('mousedown', () => trySuper());

        document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); tryFire(); });
        document.getElementById('btn-fire').addEventListener('mousedown', () => tryFire());

        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
            if(e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
            if(e.key === 'ArrowUp' || e.key === 'w') keys.gas = true;
            if(e.key === 'ArrowDown' || e.key === 's') keys.brake = true;
            if(e.key === ' ') tryFire();
            if(e.key === 'Shift') trySuper();
        });
        window.addEventListener('keyup', e => {
            if(['ArrowLeft','a','ArrowRight','d','ArrowUp','w','ArrowDown','s'].includes(e.key)) keys[e.key==='ArrowUp'||e.key==='w'?'gas':e.key==='ArrowDown'||e.key==='s'?'brake':e.key==='ArrowLeft'||e.key==='a'?'left':'right'] = false;
        });

        // --- GAME ENTITIES ---
        let gameRunning = false; let sharedScore = 0;
        
        const player = { 
            x: 0, y: 0, vx: 0, vy: 0, angle: -Math.PI/2, color: '#0ff', 
            isThrusting: false, justFired: false, cooldown: 0,
            health: 100, maxHealth: 100, role: 'none', superCooldown: 0, chargeTimer: 0, hyperLaserTimer: 0
        };
        const peerPlayer = { x: -9999, y: -9999, angle: 0, color: '#f0f', health: 100, role: 'none', chargeTimer: 0, isHyperLaser: false };
        
        let lasers = []; let enemies = []; let particles = []; let superBlasts = [];
        
        function applyRoleStats(p) {
            if (p.role === 'viltrumite') {
                p.maxHealth = 500; p.health = 500;
            } else if (p.role === 'laser') {
                p.maxHealth = 200; p.health = 200; // Buffed base health so they aren't one-shot
            }
            if (p === player) {
                document.getElementById('btn-super').style.display = 'flex';
                document.getElementById('super-text').style.display = 'block';
            }
        }

        // --- LOGIC ---
        function tryFire() {
            if (player.cooldown <= 0 && player.chargeTimer <= 0) {
                spawnLaser(player.x, player.y, player.angle, player.color, true, player.hyperLaserTimer > 0);
                player.justFired = true;
                player.cooldown = player.hyperLaserTimer > 0 ? 30 : (player.role === 'viltrumite' ? 10 : 15);
            }
        }

        function trySuper() {
            if (player.superCooldown <= 0 && player.chargeTimer <= 0 && player.role !== 'none') {
                if (player.role === 'viltrumite') {
                    player.chargeTimer = 120; // 2 sec fear-freeze charge
                } else if (player.role === 'laser') {
                    player.hyperLaserTimer = 300; // 5 sec beam
                }
                player.superCooldown = 900; // 15 seconds cooldown at 60 FPS
            }
        }

        function triggerSuperAnimation(x, y) {
            superBlasts.push({ x: x, y: y, radius: 10, maxRadius: 1500, frame: 60 });
        }

        function spawnLaser(x, y, angle, color, isLocal, isHyper) {
            if (isHyper) {
                lasers.push({ x: x + Math.cos(angle)*40, y: y + Math.sin(angle)*40, vx: Math.cos(angle)*30, vy: Math.sin(angle)*30, color: '#00ffff', age: 0, isHyper: true, size: 40 });
            } else {
                lasers.push({ x: x + Math.cos(angle)*20, y: y + Math.sin(angle)*20, vx: Math.cos(angle)*20, vy: Math.sin(angle)*20, color: color, age: 0, isHyper: false, size: 4 });
            }
        }

        function spawnExplosion(x, y, color) {
            for(let i=0; i<15; i++) {
                particles.push({ x: x, y: y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1.0, decay: 0.05, color: color });
            }
        }

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = sharedScore;
            const hpBar = document.getElementById('health-bar');
            hpBar.style.width = Math.max(0, (player.health / player.maxHealth) * 100) + "%";
            hpBar.style.background = player.health > (player.maxHealth/2) ? '#0f0' : (player.health > (player.maxHealth/4) ? '#ffaa00' : '#f00');

            if (player.role !== 'none') {
                const superBtn = document.getElementById('btn-super');
                const superText = document.getElementById('super-text');
                
                if (player.superCooldown > 0) {
                    let secs = Math.ceil(player.superCooldown / 60);
                    superText.innerText = `COOLDOWN: ${secs}s`;
                    superText.style.color = '#555';
                    superBtn.style.borderColor = '#555'; superBtn.style.color = '#555';
                    superBtn.style.boxShadow = 'none';
                } else {
                    superText.innerText = player.role === 'viltrumite' ? 'IMPACT READY' : 'HYPER BEAM READY';
                    let readyColor = player.role === 'viltrumite' ? '#ffaa00' : '#00ffff';
                    superText.style.color = readyColor;
                    superBtn.style.borderColor = readyColor; superBtn.style.color = readyColor;
                    superBtn.style.boxShadow = `0 0 15px ${readyColor}`;
                }
            }
        }

        function update() {
            // Charging Super freezes movement (Viltrumite only)
            if (player.chargeTimer > 0) {
                player.chargeTimer--;
                player.vx *= 0.8; player.vy *= 0.8; 
                
                if (player.chargeTimer === 1) {
                    triggerSuperAnimation(player.x, player.y);
                    if (conn && conn.open) conn.send({ type: 'super_trigger', x: player.x, y: player.y });
                }
            } else {
                let turnSpeed = player.role === 'viltrumite' ? 0.12 : 0.08;
                let accel = player.role === 'viltrumite' ? 0.7 : 0.4;

                if (keys.left) player.angle -= turnSpeed;
                if (keys.right) player.angle += turnSpeed;

                player.isThrusting = keys.gas;
                if (keys.gas) { player.vx += Math.cos(player.angle) * accel; player.vy += Math.sin(player.angle) * accel; }
                if (keys.brake) { player.vx *= 0.85; player.vy *= 0.85; } else { player.vx *= 0.98; player.vy *= 0.98; }
            }

            player.x += player.vx; player.y += player.vy;
            if(player.cooldown > 0) player.cooldown--;
            if(player.superCooldown > 0) player.superCooldown--;
            if(player.hyperLaserTimer > 0) player.hyperLaserTimer--;

            // Engine Exhaust Particles
            if (player.isThrusting && Math.random() > 0.3) {
                let exhaustColor = player.role === 'viltrumite' ? '#ffaa00' : player.color;
                particles.push({ x: player.x - Math.cos(player.angle)*20, y: player.y - Math.sin(player.angle)*20, vx: -player.vx*0.2, vy: -player.vy*0.2, life: 1.0, decay: 0.1, color: exhaustColor });
            }

            // Update Super Blasts
            for(let i = superBlasts.length -1; i >= 0; i--) {
                let b = superBlasts[i]; b.radius += (b.maxRadius - b.radius) * 0.15; b.frame--;
                if (isHost) {
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        if (Math.hypot(b.x - enemies[j].x, b.y - enemies[j].y) < b.radius) {
                            spawnExplosion(enemies[j].x, enemies[j].y, '#f00'); enemies.splice(j, 1); sharedScore += 50;
                        }
                    }
                }
                if (b.frame <= 0) superBlasts.splice(i, 1);
            }

            // Update Lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i]; l.x += l.vx; l.y += l.vy; l.age++;
                if (l.age > (l.isHyper ? 60 : 100)) { lasers.splice(i, 1); continue; }
                if (isHost) {
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        let hitDist = l.isHyper ? l.size + 10 : enemies[j].size;
                        if (Math.hypot(l.x - enemies[j].x, l.y - enemies[j].y) < hitDist) {
                            spawnExplosion(enemies[j].x, enemies[j].y, '#f00');
                            enemies.splice(j, 1); sharedScore += 100;
                            if (!l.isHyper) { lasers.splice(i, 1); break; }
                        }
                    }
                }
            }

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx; particles[i].y += particles[i].vy;
                particles[i].life -= particles[i].decay; if (particles[i].life <= 0) particles.splice(i, 1);
            }

            let isFearFreeze = player.chargeTimer > 0 || peerPlayer.chargeTimer > 0;

            // Host Logic (Enemies)
            if (isHost) {
                if (Math.random() < 0.04 && enemies.length < 50 && !isFearFreeze) {
                    let t = Math.random() > 0.5 ? player : peerPlayer;
                    enemies.push({ x: t.x + Math.cos(Math.random()*Math.PI*2)*1200, y: t.y + Math.sin(Math.random()*Math.PI*2)*1200, size: 20, targetId: t === player ? 'host' : 'client' });
                }

                if (!isFearFreeze) {
                    for(let i = enemies.length - 1; i >= 0; i--) {
                        let e = enemies[i];
                        let target = e.targetId === 'host' ? player : peerPlayer;
                        let angle = Math.atan2(target.y - e.y, target.x - e.x);
                        e.x += Math.cos(angle) * 4; e.y += Math.sin(angle) * 4;

                        let dHost = Math.hypot(player.x - e.x, player.y - e.y);
                        let dClient = Math.hypot(peerPlayer.x - e.x, peerPlayer.y - e.y);
                        
                        if (dHost < 30) {
                            player.health -= 15;
                            spawnExplosion(e.x, e.y, '#f00'); enemies.splice(i, 1);
                        } else if (dClient < 30) {
                            peerPlayer.health -= 15;
                            spawnExplosion(e.x, e.y, '#f00'); enemies.splice(i, 1);
                        }
                    }
                }
            }

            // Death & Respawn
            if (player.health <= 0) {
                player.health = player.maxHealth; player.x = 0; player.y = 0; player.vx = 0; player.vy = 0;
                sharedScore = Math.max(0, sharedScore - 500);
            }

            updateUI();

            // Network Sync
            if (conn && conn.open) {
                let packet = {
                    type: 'state', px: player.x, py: player.y, pa: player.angle, pc: player.color,
                    pt: player.isThrusting, pct: player.chargeTimer, prole: player.role,
                    phl: player.hyperLaserTimer > 0, fired: player.justFired
                };
                if (isHost) { packet.enemies = enemies; packet.score = sharedScore; packet.p2h = peerPlayer.health; }
                conn.send(packet);
                player.justFired = false;
            }
        }

        // --- RENDERING ---
        function draw() {
            let isImpact = superBlasts.length > 0;
            let isFearFreeze = player.chargeTimer > 0 || peerPlayer.chargeTimer > 0;

            if (isImpact && superBlasts[0].frame % 4 < 2) ctx.filter = 'invert(1)';
            else if (isFearFreeze) ctx.filter = 'grayscale(100%)'; 
            else ctx.filter = 'none';

            ctx.fillStyle = '#050510'; ctx.fillRect(0, 0, width, height);

            ctx.save();
            let camX = width / 2 - player.x; let camY = height / 2 - player.y;
            if (isImpact || player.chargeTimer > 0) { camX += (Math.random()-0.5)*15; camY += (Math.random()-0.5)*15; }
            ctx.translate(camX, camY);

            // Draw Grid
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)'; ctx.lineWidth = 2;
            const grid = 150; const sX = Math.floor((player.x - width/2)/grid)*grid; const sY = Math.floor((player.y - height/2)/grid)*grid;
            ctx.beginPath();
            for (let x=sX; x<sX+width+grid; x+=grid) { ctx.moveTo(x, player.y-height); ctx.lineTo(x, player.y+height); }
            for (let y=sY; y<sY+height+grid; y+=grid) { ctx.moveTo(player.x-width, y); ctx.lineTo(player.x+width, y); }
            ctx.stroke();

            // Draw Particles & Lasers
            particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life); ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); });
            ctx.globalAlpha = 1.0;
            
            lasers.forEach(l => { 
                ctx.shadowBlur = 15; ctx.shadowColor = l.color; ctx.fillStyle = l.color; 
                if (l.isHyper) {
                    ctx.save(); ctx.translate(l.x, l.y); ctx.rotate(Math.atan2(l.vy, l.vx));
                    ctx.fillRect(-l.size, -l.size/2, l.size*3, l.size);
                    ctx.restore();
                } else {
                    ctx.beginPath(); ctx.arc(l.x, l.y, 4, 0, Math.PI*2); ctx.fill(); 
                }
            });

            // Draw Enemies
            enemies.forEach(e => {
                ctx.save(); ctx.translate(e.x, e.y); ctx.shadowBlur = 15; ctx.shadowColor = '#f00';
                ctx.strokeStyle = '#f00'; ctx.lineWidth = 3; ctx.beginPath();
                ctx.moveTo(20, 0); ctx.lineTo(-10, 15); ctx.lineTo(-10, -15); ctx.closePath(); ctx.stroke(); 
                if (isFearFreeze) { ctx.translate((Math.random()-0.5)*5, (Math.random()-0.5)*5); }
                ctx.restore();
            });

            // Draw Super Blasts
            superBlasts.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 255, 255, ${b.frame/60})`; ctx.fill();
                ctx.lineWidth = 15 * (b.frame/60); ctx.strokeStyle = '#ffaa00'; ctx.stroke();
            });

            // Draw Players
            if (peerPlayer.x !== -9999 && peerPlayer.role !== 'none') drawEntity(peerPlayer.x, peerPlayer.y, peerPlayer.angle, peerPlayer.color, peerPlayer.isThrusting, peerPlayer.role, peerPlayer.chargeTimer);
            if (player.role !== 'none') drawEntity(player.x, player.y, player.angle, player.color, player.isThrusting, player.role, player.chargeTimer);

            ctx.restore();
        }

        function drawEntity(x, y, angle, color, isThrusting, role, chargeTimer) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
            
            if (role === 'viltrumite') {
                const colors = ['#f00', '#0f0', '#00f', '#ff0', '#f0f', '#0ff', '#fff'];
                let glow = (chargeTimer > 0) ? colors[Math.floor(Date.now() / 50) % colors.length] : '#ffaa00';
                ctx.shadowBlur = chargeTimer > 0 ? 40 : 25; ctx.shadowColor = glow;
                
                // Cape
                ctx.fillStyle = '#ff0000';
                ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(-35, -15); ctx.lineTo(-30, 0); ctx.lineTo(-35, 15); ctx.fill();
                // Body
                ctx.fillStyle = '#ffcc00'; ctx.fillRect(-15, -6, 20, 12); 
                ctx.fillStyle = '#0044ff'; ctx.fillRect(-10, -5, 10, 10); 
                // Head
                ctx.fillStyle = '#ffcc99'; 
                ctx.beginPath(); ctx.arc(12, 0, 7, 0, Math.PI*2); ctx.fill();
                // Fists
                ctx.fillStyle = '#ffcc99';
                ctx.beginPath(); ctx.arc(22, -8, 4, 0, Math.PI*2); ctx.fill(); 
                ctx.beginPath(); ctx.arc(22, 8, 4, 0, Math.PI*2); ctx.fill(); 
                // Aura
                ctx.strokeStyle = glow; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(0, 0, 30 + Math.random()*5, 0, Math.PI*2); ctx.stroke();

            } else if (role === 'laser') {
                ctx.shadowBlur = 20; ctx.shadowColor = '#00ffff'; ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 3; ctx.fillStyle = '#111';
                ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(-15, 15); ctx.lineTo(-10, 0); ctx.lineTo(-15, -15); ctx.closePath();
                ctx.fill(); ctx.stroke();

                if (isThrusting) {
                    ctx.fillStyle = '#fff'; ctx.shadowColor = '#00ffff';
                    ctx.beginPath(); ctx.moveTo(-12, -5); ctx.lineTo(-25, 0); ctx.lineTo(-12, 5); ctx.fill();
                }
            }
            ctx.restore();
        }

        function loop() { if (!gameRunning) return; update(); draw(); requestAnimationFrame(loop); }
        function startGame() { 
            gameRunning = true; player.x = isHost ? -100 : 100; 
            if (isHost) {
                player.role = Math.random() > 0.5 ? 'viltrumite' : 'laser';
                applyRoleStats(player);
            }
            requestAnimationFrame(loop); 
        }
    </script>
</body>
</html>
